<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Agrow</title>

  <!-- ArcGIS JS (same as labs) -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.26/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.26/"></script>

  <style>
    html, body {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
    }

    #appContainer {
      display: flex;
      height: 100%;
      width: 100%;
    }

    /* sidebar */
    #sidebar {
      width: 280px;
      padding: 16px;
      background: #f7f7f7;
      border-right: 1px solid #ddd;
      overflow-y: auto;
    }

    #sidebar h2 {
      margin: 0 0 14px 0;
      font-size: 26px;
      font-weight: 700;
    }

    #sidebar label {
      font-size: 14px;
      margin-top: 10px;
      display: block;
    }

    #sidebar select {
      width: 100%;
      padding: 6px;
      margin-top: 5px;
    }

    .btn {
      margin-top: 12px;
      width: 100%;
      padding: 9px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    #searchBtn {
      background: #2f7edb;
      color: white;
    }

    #searchBtn:hover {
      background: #2568b6;
    }

    #clearFilters {
      background: #4CAF50;
      color: white;
    }

    #clearFilters:hover {
      background: #45a049;
    }

    /* map */
    #viewDiv {
      flex: 1;
    }

    /* mobile */
    @media (max-width: 768px) {
      #appContainer {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #ddd;
      }

      #viewDiv {
        height: 70%;
      }
    }
  </style>
</head>

<body>
  <div id="appContainer">

    <!-- Sidebar Filters -->
    <div id="sidebar">
      <h2>Search Filters</h2>

      <label>Observation Type</label>
      <select id="obsFilter">
        <option value="">All</option>
      </select>

      <label>Status</label>
      <select id="statusFilter">
        <option value="">All</option>
      </select>

      <label>Severity</label>
      <select id="severityFilter">
        <option value="">All</option>
      </select>

      <label>Crop Type</label>
      <select id="cropFilter">
        <option value="">All</option>
      </select>

      <button id="searchBtn" class="btn">Search</button>
      <button id="clearFilters" class="btn">Clear Filters</button>
    </div>

    <!-- Map -->
    <div id="viewDiv"></div>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
